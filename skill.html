<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile-tegar</title>
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="skill.css">
</head>
<body>
    <section class="skills-section">

        <!-- Technical Skills -->
        <div class="skills-container">
            <h2 class="skills-title">Technical Skills</h2>

            <div class="skill-bar-box">
                <div class="info">
                    <span><i class='bx bxs-game'></i> Gaming</span>
                    <span>80%</span>
                </div>
                <div class="bar"><span class="gaming"></span></div>
            </div>

            <div class="skill-bar-box">
                <div class="info">
                    <span><i class='bx bxs-edit'></i> Typing</span>
                    <span>60%</span>
                </div>
                <div class="bar"><span class="typing"></span></div>
            </div>

            <div class="skill-bar-box">
                <div class="info">
                    <span><i class='bx bx-code-alt'></i> Programming</span>
                    <span>45%</span>
                </div>
                <div class="bar"><span class="programming"></span></div>
            </div>

            <div class="skill-bar-box">
                <div class="info">
                    <span><i class='bx bxl-figma'></i> UI/UX Design</span>
                    <span>25%</span>
                </div>
                <div class="bar"><span class="uiux"></span></div>
            </div>
        </div>

        <!-- Programming Languages -->
        <div class="skills-container">
            <h2 class="skills-title">Programming Languages</h2>

            <div class="lang-grid">
                <div class="lang-card">
                    <div class="lang-icon html-icon">
                        <i class='bx bxl-html5'></i>
                    </div>
                    <div class="lang-info">
                        <div class="lang-header">
                            <span class="lang-name">HTML</span>
                            <span class="lang-percent">85%</span>
                        </div>
                        <div class="lang-bar">
                            <div class="lang-fill html-fill"></div>
                        </div>
                        <p class="lang-desc">HyperText Markup Language</p>
                    </div>
                </div>

                <div class="lang-card">
                    <div class="lang-icon css-icon">
                        <i class='bx bxl-css3'></i>
                    </div>
                    <div class="lang-info">
                        <div class="lang-header">
                            <span class="lang-name">CSS</span>
                            <span class="lang-percent">70%</span>
                        </div>
                        <div class="lang-bar">
                            <div class="lang-fill css-fill"></div>
                        </div>
                        <p class="lang-desc">Cascading Style Sheets</p>
                    </div>
                </div>

                <div class="lang-card">
                    <div class="lang-icon php-icon">
                        <i class='bx bxl-php'></i>
                    </div>
                    <div class="lang-info">
                        <div class="lang-header">
                            <span class="lang-name">PHP</span>
                            <span class="lang-percent">55%</span>
                        </div>
                        <div class="lang-bar">
                            <div class="lang-fill php-fill"></div>
                        </div>
                        <p class="lang-desc">Hypertext Preprocessor</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Soft Skills -->
        <div class="skills-container" style="margin-top: 3rem;">
            <h2 class="skills-title">Soft Skills</h2>
            <div class="circular-grid">
                <div class="circle-box">
                    <div class="outer-circle" style="--percent: 75;">
                        <div class="inner-circle">75%</div>
                    </div>
                    <span>Responsibility</span>
                </div>

                <div class="circle-box">
                    <div class="outer-circle" style="--percent: 71;">
                        <div class="inner-circle">70%</div>
                    </div>
                    <span>Creativity</span>
                </div>

                <div class="circle-box">
                    <div class="outer-circle" style="--percent: 80;">
                        <div class="inner-circle">80%</div>
                    </div>
                    <span>Teamwork</span>
                </div>
            </div>
        </div>

    </section>

    <script src="script.js"></script>
</body>
</html>
