<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile-tegar</title>
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="skill.css">
</head>
<body>
    <section class="skills-section">
    <div class="skills-container">
        <h2 class="skills-title">Technical Skills</h2>
        <div class="skill-bar-box">
            <div class="info">
                <span><i class='bx bxs-game'></i> Gaming</span>
                <span>80%</span>
            </div>
            <div class="bar"><span class="gaming"></span></div>
        </div>

        <div class="skill-bar-box">
            <div class="info">
                <span><i class='bx bxs-edit'></i> Typing</span>
                <span>60%</span>
            </div>
            <div class="bar"><span class="typing"></span></div>
        </div>

        <div class="skill-bar-box">
            <div class="info">
                <span><i class='bx bx-code-alt'></i> Programming</span>
                <span>45%</span>
            </div>
            <div class="bar"><span class="programming"></span></div>
        </div>
        
        <div class="skill-bar-box">
            <div class="info">
                <span><i class='bx bx-brush-sparkles'></i>UI/UX Design</span>
                <span>25%</span>
            </div>
            <div class="bar"><span class="UI/UX"></span></div>
        </div>
        </div>


    <div class="skills-container">
        <h2 class="skills-title">Soft Skills</h2>
        <div class="circular-grid">
            <div class="circle-box">
                <div class="outer-circle" style="--percent: 75;">
                    <div class="inner-circle">75%</div>
                </div>
                <span>Responsibility</span>
            </div>

            <div class="circle-box">
                <div class="outer-circle" style="--percent: 71;">
                    <div class="inner-circle">70%</div>
                </div>
                <span>Creativity</span>
            </div>

            <div class="circle-box">
                <div class="outer-circle" style="--percent: 80;">
                    <div class="inner-circle">80%</div>
                </div>
                <span>Teamwork</span>

            
    </div>

    <div>

    </div>
</section>

    </div>
    <script src="script.js"></script>
</body>
</html>
