<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/skills.css" />
</head>
<body>
    <canvas id="particleCanvas" aria-hidden="true"></canvas>
    <nav class="navbar" id="navbar">
        <a href="index.html" class="logo"><span class="logo-bracket">&lt;</span>Garzyy<span class="logo-bracket">/&gt;</span></a>
        <button class="hamburger" id="hamburger" aria-label="Toggle menu"><span></span><span></span><span></span></button>
        <ul class="nav-links" id="navLinks">
            <li><a href="index.html" class="nav-link">Home</a></li>
            <li><a href="about.html" class="nav-link">About</a></li>
            <li><a href="projek.html" class="nav-link">Projects</a></li>
            <li><a href="skill.html" class="nav-link active">Skills</a></li>
            <li><a href="contact.html" class="nav-link">Contact</a></li>
        </ul>
        <div class="nav-overlay" id="navOverlay"></div>
    </nav>

    <section class="skills-section" id="skills">
        <div class="glow glow-1" aria-hidden="true"></div>
        <div class="glow glow-2" aria-hidden="true"></div>
        <div class="section-header" data-aos="fade-up">
            <span class="section-tag">// what i know</span>
            <h1 class="section-title">My <span class="gradient-text">Skills</span></h1>
            <p class="section-subtitle">Teknologi dan tools yang saya kuasai</p>
        </div>

        <div class="tech-grid" data-aos="fade-up">
            <div class="tech-card glass-card">
                <div class="tech-icon html-color"><i class='bx bxl-html5'></i></div>
                <span class="tech-name">HTML5</span>
                <div class="tech-bar-wrap">
                    <div class="tech-bar"><div class="tech-bar-fill html-bg" data-width="80"></div></div>
                    <span class="tech-percent">80%</span>
                </div>
            </div>
            <div class="tech-card glass-card">
                <div class="tech-icon css-color"><i class='bx bxl-css3'></i></div>
                <span class="tech-name">CSS3</span>
                <div class="tech-bar-wrap">
                    <div class="tech-bar"><div class="tech-bar-fill css-bg" data-width="65"></div></div>
                    <span class="tech-percent">65%</span>
                </div>
            </div>
            <div class="tech-card glass-card">
                <div class="tech-icon php-color"><i class='bx bxl-php'></i></div>
                <span class="tech-name">PHP</span>
                <div class="tech-bar-wrap">
                    <div class="tech-bar"><div class="tech-bar-fill php-bg" data-width="55"></div></div>
                    <span class="tech-percent">55%</span>
                </div>
            </div>
            <div class="tech-card glass-card">
                <div class="tech-icon mysql-color"><i class='bx bx-data'></i></div>
                <span class="tech-name">MySQL</span>
                <div class="tech-bar-wrap">
                    <div class="tech-bar"><div class="tech-bar-fill mysql-bg" data-width="50"></div></div>
                    <span class="tech-percent">50%</span>
                </div>
            </div>
            <div class="tech-card glass-card">
                <div class="tech-icon bs-color"><i class='bx bxl-bootstrap'></i></div>
                <span class="tech-name">Bootstrap</span>
                <div class="tech-bar-wrap">
                    <div class="tech-bar"><div class="tech-bar-fill bs-bg" data-width="60"></div></div>
                    <span class="tech-percent">60%</span>
                </div>
            </div>
            <div class="tech-card glass-card">
                <div class="tech-icon git-color"><i class='bx bxl-git'></i></div>
                <span class="tech-name">Git</span>
                <div class="tech-bar-wrap">
                    <div class="tech-bar"><div class="tech-bar-fill git-bg" data-width="40"></div></div>
                    <span class="tech-percent">40%</span>
                </div>
            </div>
        </div>

        <div class="other-skills" data-aos="fade-up">
            <h2 class="subsection-title">General <span class="gradient-text">Skills</span></h2>
            <div class="skills-bars-grid">
                <div class="skill-bar-item glass-card">
                    <div class="skill-bar-header"><span><i class='bx bxs-game'></i> Gaming</span><span class="skill-pct">80%</span></div>
                    <div class="skill-track"><div class="skill-fill" data-width="80" style="--bar-color:#00d9ff;"></div></div>
                </div>
                <div class="skill-bar-item glass-card">
                    <div class="skill-bar-header"><span><i class='bx bxs-keyboard'></i> Typing Speed</span><span class="skill-pct">60%</span></div>
                    <div class="skill-track"><div class="skill-fill" data-width="60" style="--bar-color:#a78bfa;"></div></div>
                </div>
                <div class="skill-bar-item glass-card">
                    <div class="skill-bar-header"><span><i class='bx bx-code-alt'></i> Programming</span><span class="skill-pct">55%</span></div>
                    <div class="skill-track"><div class="skill-fill" data-width="55" style="--bar-color:#34d399;"></div></div>
                </div>
                <div class="skill-bar-item glass-card">
                    <div class="skill-bar-header"><span><i class='bx bxl-figma'></i> UI/UX Design</span><span class="skill-pct">30%</span></div>
                    <div class="skill-track"><div class="skill-fill" data-width="30" style="--bar-color:#f472b6;"></div></div>
                </div>
            </div>
        </div>
    </section>
    <script src="js/main.js"></script>
</body>
</html>
